async function loadGallery(name,id){const box=document.getElementById(id);if(!box||box.dataset.loaded)return;box.dataset.loaded='1';let imgs=curatedPhotos[name]||[];try{if(imgs.length<3){const q=encodeURIComponent(name+' France');const u=`https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${q}&gsrnamespace=6&gsrlimit=8&prop=imageinfo&iiprop=url&iiurlwidth=1000&format=json&origin=*`;const d=await (await fetch(u)).json();const got=Object.values(d.query?.pages||{}).map(x=>x.imageinfo?.[0]?.thumburl).filter(Boolean);imgs=[...new Set([...imgs,...got])].slice(0,5)}if(!imgs.length)throw Error();box.innerHTML=`<div class="gallery-track">${imgs.map((u,i)=>`<img class="gallery-slide" loading="lazy" src="${u}" alt="${esc(name)} — photo ${i+1}">`).join('')}</div><span class="gallery-count">1 / ${imgs.length}</span><div class="gallery-nav">${imgs.map((_,i)=>`<i class="gallery-dot ${i?'':'active'}"></i>`).join('')}</div>`;const track=box.querySelector('.gallery-track'),count=box.querySelector('.gallery-count'),dots=[...box.querySelectorAll('.gallery-dot')];track.addEventListener('scroll',()=>{const n=Math.round(track.scrollLeft/track.clientWidth);count.textContent=`${n+1} / ${imgs.length}`;dots.forEach((d,i)=>d.classList.toggle('active',i===n))},{passive:true});const note=document.getElementById(id+'-note');if(note)note.textContent='Fais glisser les photos pour parcourir la galerie.'}catch(e){box.innerHTML='';const note=document.getElementById(id+'-note');if(note)note.textContent='Galerie indisponible : utilise « En savoir plus » pour découvrir le lieu.'}}
function esc(x){return x.replaceAll('&','&amp;').replaceAll('<','&lt;')};S.forEach(x=>{const[n,la,lo,cat,stars,d,desc,url]=x,ic=L.divIcon({className:'',html:`<div class="pin" style="background:${C[cat]}"><i></i></div>`,iconSize:[31,31],iconAnchor:[15,31]});const wz=`https://waze.com/ul?ll=${la},${lo}&navigate=yes`, search=`https://www.google.com/search?q=${encodeURIComponent(n+' tourisme visite')}`,routeId='route-'+la.toString().replace('.','')+'-'+lo.toString().replace('.','');const photoId='photo-'+la.toString().replace('.','')+'-'+lo.toString().replace('.','');const marker=L.marker([la,lo],{icon:ic}).bindPopup(`<h2>${esc(n)}</h2><div id="${photoId}" class="gallery" aria-label="Galerie photos de ${esc(n)}"></div><p id="${photoId}-note" class="photo-note">Chargement des photos…</p><div class="meta"><span class="tag" style="background:${C[cat]}">${cat}</span> &nbsp;${d}</div><div class="stars" aria-label="${stars} étoiles">${'★'.repeat(stars)}${'☆'.repeat(5-stars)}</div><p>${esc(desc)}</p><div class="buttons"><a class="btn explore" target="_blank" rel="noopener" href="${search}">En savoir plus</a><a class="btn waze" target="_blank" rel="noopener" href="${wz}">Itinéraire Waze</a><button class="btn route" onclick="routeTo(${la},${lo},'${routeId}')">Calculer le trajet</button></div><div id="${routeId}" style="margin-top:8px;font-size:13px;color:#2a8551"></div>`);marker.on('popupopen',()=>{loadGallery(n,photoId);document.querySelector('#panel').classList.add('collapsed');document.querySelector('#panelToggle').setAttribute('aria-expanded','false')});marker.addTo(G[cat])});
const f=document.querySelector('#filters');['Tout',...Object.keys(C)].forEach((x,i)=>{let b=document.createElement('button');b.textContent=x;b.className=i?'':'active';b.onclick=()=>{document.querySelectorAll('.filters button').forEach(q=>q.classList.remove('active'));b.classList.add('active');Object.entries(G).forEach(([k,g])=>x==='Tout'||x===k?map.addLayer(g):map.removeLayer(g))};f.append(b)});L.circle([44.2194,1.6122],{radius:60000,color:'#087ca7',weight:2,dashArray:'7 6',fillOpacity:.035}).addTo(map);L.marker([44.2194,1.6122],{icon:L.divIcon({className:'',html:'<div style="font-size:27px">🏠</div>',iconSize:[27,27],iconAnchor:[14,27]})}).addTo(map).bindPopup('<b>Cayriech</b><br>Point de départ');
