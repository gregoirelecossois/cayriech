const map=L.map('map',{zoomControl:false}).setView([44.10,1.48],10);L.control.zoom({position:'bottomright'}).addTo(map);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);const G={};Object.keys(C).forEach(k=>G[k]=L.layerGroup().addTo(map));
async function setPosition(){
 if(!window.isSecureContext){status.textContent='Le GPS nécessite GitHub Pages : ouvre la carte depuis son adresse https://…';return false}
 if(!navigator.geolocation){status.textContent='La géolocalisation n’est pas disponible sur ce navigateur.';return false}
 status.textContent='Recherche de votre position…';
 return new Promise(resolve=>navigator.geolocation.getCurrentPosition(pos=>{origin={lat:pos.coords.latitude,lng:pos.coords.longitude};if(originMarker)map.removeLayer(originMarker);originMarker=L.marker([origin.lat,origin.lng]).addTo(map).bindPopup('<b>Votre position actuelle</b>');status.textContent='Position activée. Ouvre une destination et touche « Calculer le trajet ». ';resolve(true)},err=>{status.textContent=err.code===1?'Position refusée : dans Chrome, touche le cadenas > Autorisations > Position > Autoriser, puis recharge.':'Position indisponible : active le GPS et réessaie.';resolve(false)},{enableHighAccuracy:true,timeout:15000,maximumAge:60000}))}
document.querySelector('#locate').onclick=setPosition;
async function routeTo(lat,lng,id){const box=document.getElementById(id);if(!origin){box.textContent='Active d’abord « Ma position » en haut de la carte.';const ok=await setPosition();if(!ok)return}box.textContent='Calcul du trajet…';try{const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${origin.lng},${origin.lat};${lng},${lat}?overview=false`),d=await r.json(),rt=d.routes?.[0];if(!rt)throw Error();const min=Math.round(rt.duration/60), km=(rt.distance/1000).toFixed(1);box.innerHTML=`<b>Depuis votre position :</b> environ ${min} min · ${km} km`;}catch(e){box.textContent='Calcul indisponible. Vérifie ta connexion et réessaie.'}}
async function loadPhoto(name,id){const el=document.getElementById(id);if(!el||el.dataset.loaded)return;el.dataset.loaded='1';try{const q=encodeURIComponent(name+' France');const r=await fetch(`https://fr.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${q}&gsrnamespace=0&gsrlimit=1&prop=pageimages&piprop=thumbnail&pithumbsize=800&format=json&origin=*`);const d=await r.json();const pg=Object.values(d.query?.pages||{})[0],url=pg?.thumbnail?.source;if(!url)throw Error();el.src=url;el.alt='Photo de '+name;el.style.display='block'}catch(e){el.style.display='none';const note=document.getElementById(id+'-note');if(note)note.textContent='Photo indisponible : utilise « En savoir plus » pour voir le site.'}}
function esc(x){return x.replaceAll('&','&amp;').replaceAll('<','&lt;')};S.forEach(x=>{const[n,la,lo,cat,stars,d,desc,url]=x,ic=L.divIcon({className:'',html:`<div class="pin" style="background:${C[cat]}"><i></i></div>`,iconSize:[31,31],iconAnchor:[15,31]});const wz=`https://waze.com/ul?ll=${la},${lo}&navigate=yes`, search=`https://www.google.com/search?q=${encodeURIComponent(n+' tourisme visite')}`,routeId='route-'+la.toString().replace('.','')+'-'+lo.toString().replace('.','');const photoId='photo-'+la.toString().replace('.','')+'-'+lo.toString().replace('.','');const marker=L.marker([la,lo],{icon:ic}).bindPopup(`<h2>${esc(n)}</h2><img id="${photoId}" class="photo" style="display:none" alt="Chargement de la photo"><p id="${photoId}-note" class="photo-note">Chargement de la photo emblématique…</p><div class="meta"><span class="tag" style="background:${C[cat]}">${cat}</span> &nbsp;${d}</div><div class="stars" aria-label="${stars} étoiles">${'★'.repeat(stars)}${'☆'.repeat(5-stars)}</div><p>${esc(desc)}</p><div class="buttons"><a class="btn explore" target="_blank" rel="noopener" href="${search}">En savoir plus</a><a class="btn waze" target="_blank" rel="noopener" href="${wz}">Itinéraire Waze</a><button class="btn route" onclick="routeTo(${la},${lo},'${routeId}')">Calculer le trajet</button></div><div id="${routeId}" style="margin-top:8px;font-size:13px;color:#2a8551"></div>`);marker.on('popupopen',()=>loadPhoto(n,photoId));marker.addTo(G[cat])});
